<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1e3a8a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-title" content="Orlando">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Orlando Trip Planner</title>
<style>
/* ===== CSS VARIABLES ===== */
:root{
  --bg:#0f172a;--bg2:#111827;--bg3:#1e293b;--bg4:#0b1220;--bg-dim:#1a2234;--bg-in:#0f172a;--btn:#1f2937;
  --bd:#1f2937;--bd2:#334155;--bd3:#374151;
  --tx:#e2e8f0;--tx2:#cbd5e1;--tx3:#94a3b8;--tx4:#64748b;--txs:#f1f5f9;--txn:#fff;
  --sh:rgba(0,0,0,.4);
  --time-c:#fbbf24;--tip-txt-c:#fbbf24;
  --tips-bg:#1e1b4b;--tips-bd:#4c1d95;--tips-tx:#ddd6fe;--tips-b:#fbbf24;
  --meal-bg:#422006;--meal-bd:#78350f;--meal-tx:#fde68a;
  --show-bg:#2e1065;--show-bd:#7c3aed;--show-tx:#ddd6fe;
  --tip-bg:#0c4a6e;--tip-bd:#0891b2;--tip-tx:#bae6fd;
  color-scheme:dark;
}
body.light{
  --bg:#f8fafc;--bg2:#f0f4f8;--bg3:#ffffff;--bg4:#ffffff;--bg-dim:#e8eef4;--bg-in:#f1f5f9;--btn:#edf2f7;
  --bd:#d1d9e0;--bd2:#c8d3dc;--bd3:#94a3b8;
  --tx:#1e293b;--tx2:#334155;--tx3:#475569;--tx4:#64748b;--txs:#0f172a;--txn:#0f172a;
  --sh:rgba(0,0,0,.1);
  --time-c:#b45309;--tip-txt-c:#92400e;
  --tips-bg:#eff6ff;--tips-bd:#93c5fd;--tips-tx:#1e3a8a;--tips-b:#b45309;
  --meal-bg:#fef9c3;--meal-bd:#ca8a04;--meal-tx:#713f12;
  --show-bg:#faf5ff;--show-bd:#9333ea;--show-tx:#4a1d96;
  --tip-bg:#f0f9ff;--tip-bd:#0284c7;--tip-tx:#0c4a6e;
  color-scheme:light;
}
/* ===== BASE ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--tx);overscroll-behavior:none;overflow:hidden}
body{display:flex;flex-direction:column;height:100%;height:100dvh;transition:background .2s,color .2s}
/* ===== HEADER ===== */
header{background:linear-gradient(135deg,#1e3a8a,#7c2d92);padding:10px 14px;box-shadow:0 2px 8px var(--sh);position:sticky;top:0;z-index:96;overflow:hidden;display:flex;align-items:center;justify-content:space-between;gap:8px}
.header-left{flex:1;min-width:0}
header h1{font-size:1.05rem;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:8px;color:#fff}
header h1 .logo{font-size:1.2rem}
.sub{font-size:.68rem;opacity:.75;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
.theme-btn{padding:6px 8px;background:rgba(255,255,255,.15);border:0;color:#fff;border-radius:8px;font-size:1rem;cursor:pointer;flex:none;line-height:1;transition:background .15s}
.theme-btn:active{transform:scale(.9)}
/* ===== PARK TABS ===== */
.park-tabs{display:flex;gap:6px;overflow-x:auto;padding:8px 10px;background:var(--bg2);border-bottom:1px solid var(--bd);position:sticky;top:52px;z-index:40;scrollbar-width:none}
.park-tabs::-webkit-scrollbar{display:none}
.park-tab{flex:none;padding:7px 12px;background:var(--btn);border:1px solid var(--bd3);border-radius:999px;color:var(--tx2);font-size:.78rem;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .15s}
.park-tab.active{background:var(--park-color,#7c3aed);border-color:var(--park-color,#7c3aed);color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.15)}
.park-tab:active{transform:scale(.96)}
/* ===== MAIN ===== */
main{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;position:relative}
.back-chip{display:flex;align-items:center;gap:6px;padding:9px 14px;background:#7c3aed;color:#fff;border:0;border-radius:999px;font-weight:700;font-size:.82rem;cursor:pointer;margin-bottom:12px;box-shadow:0 2px 8px rgba(124,58,237,.4);animation:slideIn .2s}
.back-chip:active{transform:scale(.96)}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.park-header{padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.park-title{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:8px}
.park-badge{width:10px;height:10px;border-radius:50%;background:var(--park-color,#7c3aed)}
.gps-btn{padding:6px 10px;background:var(--bg3);border:1px solid var(--bd2);border-radius:6px;color:var(--tx2);font-size:.72rem;cursor:pointer;display:flex;align-items:center;gap:5px}
.gps-btn.active{background:#047857;border-color:#10b981;color:#fff}
.gps-btn:active{transform:scale(.96)}
.content{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
/* ===== MAP ===== */
.map-expand-btn{position:absolute;top:20px;right:20px;z-index:5;background:var(--bg3);border:1px solid var(--bd2);color:var(--tx2);padding:6px 10px;border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:600;box-shadow:0 2px 6px var(--sh);display:flex;align-items:center;gap:5px}
.map-fs-overlay{position:fixed;inset:0;z-index:200;background:#1e293b;display:flex;flex-direction:column}
.map-fs-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#0f172a;border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0}
.map-fs-title{font-weight:700;font-size:.95rem;color:var(--tx)}
.map-fs-container{flex:1;overflow:hidden;position:relative;touch-action:none;cursor:grab;background:#1e293b}
.map-fs-container:active{cursor:grabbing}
.map-fs-svg{position:absolute;top:0;left:0;width:400px;height:400px;display:block;transform-origin:0 0;background:#1e293b}
.map-fs-info{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--bd2);border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:10px;min-width:220px;max-width:82vw;box-shadow:0 4px 20px rgba(0,0,0,.45);z-index:20;transition:opacity .15s}
.map-fs-info.hidden{display:none}
.map-fs-info-body{flex:1;min-width:0}
.map-fs-info-name{font-size:.9rem;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.map-fs-info-sub{font-size:.75rem;color:var(--tx3);margin-top:1px}
.map-fs-info-btn{background:var(--park-color,#ec4899);color:#fff;border:none;border-radius:8px;padding:7px 13px;font-size:.82rem;font-weight:700;cursor:pointer;flex-shrink:0;white-space:nowrap}
.map-fs-hint{padding:6px 16px;font-size:.68rem;color:var(--tx4);text-align:center;background:var(--bg2);flex-shrink:0}
.map-wrap{position:relative;padding:8px 12px 72px;background:var(--bg)}
.map-zoom-wrap{position:relative;overflow:hidden;border-radius:12px;touch-action:none;transform:translateZ(0);-webkit-transform:translateZ(0);isolation:isolate}
.map-svg{width:100%;height:auto;background:#1e293b;display:block;transform-origin:0 0}
.map-filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.map-fs-filters{display:flex;gap:6px;padding:8px 12px;background:#0f172a;border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0;flex-wrap:wrap}
.map-filter-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--bd2);background:var(--bg2);color:var(--tx3);font-size:1rem;cursor:pointer;transition:background .15s,border-color .15s;box-shadow:0 1px 4px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.map-filter-btn.active{background:var(--bg2);border-color:var(--park-color,#ec4899);border-width:2.5px;opacity:1}.map-filter-btn:not(.active){opacity:.4}
.gps-status{font-size:.72rem;color:var(--tx3);margin-top:8px;padding:8px 10px;background:var(--bg3);border-radius:6px;border:1px solid var(--bd)}
.gps-status.ok{color:#6ee7b7;background:#064e3b;border-color:#065f46}
.gps-status.err{color:#fca5a5;background:#7f1d1d;border-color:#991b1b}
/* ===== LIST ===== */
.stats-bar{display:flex;gap:8px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--bd);font-size:.72rem;color:var(--tx3)}
.stat{display:flex;gap:4px;align-items:center}
.stat-num{color:var(--txn);font-weight:700}
.attr-list{padding:10px 12px 80px}
.filter-row{display:flex;gap:6px;margin-bottom:10px;align-items:center}
.search{flex:1;padding:9px 12px;background:var(--btn);border:1px solid var(--bd3);color:var(--tx);border-radius:8px;font-size:.85rem;outline:none}
.search:focus{border-color:#7c3aed}
.filter-btn{padding:9px 10px;background:var(--btn);border:1px solid var(--bd3);border-radius:8px;color:var(--tx2);font-size:.75rem;cursor:pointer}
.filter-btn.active{background:#7c3aed;border-color:#7c3aed;color:#fff}
.attr-card{background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;padding:12px;margin-bottom:10px;transition:all .15s}
.attr-card.done{opacity:.6;background:var(--bg-dim)}
.attr-row1{display:flex;gap:10px;align-items:flex-start}
.attr-check{width:22px;height:22px;border:2px solid var(--tx4);border-radius:6px;flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;margin-top:2px}
.attr-check.checked{background:#10b981;border-color:#10b981}
.attr-check.checked::after{content:"✓";color:#fff;font-weight:800;font-size:.95rem}
.attr-info{flex:1;min-width:0}
.attr-name{font-size:.92rem;font-weight:700;color:var(--txs);line-height:1.25}
.attr-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:.7rem;color:var(--tx3);margin-top:3px}
.attr-tag{padding:2px 7px;border-radius:999px;background:var(--bd2);font-weight:600;color:var(--tx2)}
.attr-tag.thrill{background:#7f1d1d;color:#fecaca}
.attr-tag.family{background:#065f46;color:#a7f3d0}
.attr-tag.kids{background:#1e40af;color:#bfdbfe}
.attr-tag.water{background:#0c4a6e;color:#bae6fd}
.attr-tag.show{background:#581c87;color:#e9d5ff}
.attr-land{font-size:.7rem;color:var(--tx2);opacity:.8}
.prio-row{display:flex;gap:4px;margin-top:8px}
.prio-btn{flex:1;padding:6px 8px;background:var(--bg-in);border:1px solid var(--bd2);color:var(--tx3);border-radius:6px;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .15s}
.prio-btn[data-p="must"].active{background:#b45309;border-color:#f59e0b;color:#fff}
.prio-btn[data-p="skip"].active{background:#7f1d1d;border-color:#ef4444;color:#fff}
.prio-btn:active{transform:scale(.96)}
.attr-card.skipped{opacity:.45}
.attr-row2{margin-top:10px;display:flex;flex-direction:column;gap:8px;width:100%;overflow:hidden}
.attr-row2-top{display:flex;gap:8px;width:100%}
.attr-row2-top .field{flex:1;min-width:0;overflow:hidden}
.field label{display:block;font-size:.65rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.field input{width:100%;min-width:0;padding:7px 9px;background:var(--bg-in);border:1px solid var(--bd2);color:var(--tx);border-radius:6px;font-size:1rem;outline:none}
.field input:focus{border-color:#7c3aed}
.field.full{width:100%}
.attr-notes{width:100%;min-height:38px;padding:7px 9px;background:var(--bg-in);border:1px solid var(--bd2);color:var(--tx);border-radius:6px;font-size:.8rem;outline:none;resize:vertical;font-family:inherit}
.attr-notes:focus{border-color:#7c3aed}
.distance{font-size:.7rem;color:var(--tx3);font-weight:600}
.distance.near{color:#6ee7b7}
/* ===== MODAL ===== */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal.show{display:flex}
.modal-content{background:var(--bg3);border-radius:14px;padding:18px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto;border:1px solid var(--bd2)}
.modal h2{font-size:1rem;margin-bottom:10px;color:var(--txs)}
.modal p{font-size:.85rem;color:var(--tx2);margin-bottom:12px;line-height:1.5}
.modal textarea{width:100%;min-height:180px;padding:10px;background:var(--bg-in);border:1px solid var(--bd2);color:var(--tx);border-radius:6px;font-size:.75rem;font-family:ui-monospace,Menlo,monospace;margin-bottom:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-actions button{padding:8px 14px;border:0;border-radius:6px;cursor:pointer;font-weight:600;font-size:.82rem}
.btn-cancel{background:var(--bd2);color:var(--tx2)}

.am-close-btn{position:absolute;top:16px;right:16px;background:none;border:0;color:var(--tx4);font-size:1.3rem;cursor:pointer;padding:4px;line-height:1;border-radius:6px;transition:color .15s}
.am-close-btn:active{color:var(--tx)}
.am-dicas-btn{display:flex;align-items:center;gap:6px;width:100%;background:none;border:none;border-top:1px solid var(--bd2);border-bottom:1px solid var(--bd2);color:var(--tx3);font-size:.82rem;font-weight:600;cursor:pointer;padding:10px 2px;margin:8px 0 14px;text-align:left;transition:color .15s}
.am-dicas-btn.active{color:var(--tx);font-weight:700}
.am-dicas-btn:active{opacity:.7}
.am-tabs{display:flex;gap:0;margin-bottom:16px;background:#0f172a;border-radius:10px;padding:3px}
.am-tab{flex:1;padding:9px 8px;background:none;border:0;color:#64748b;font-size:.82rem;font-weight:700;border-radius:8px;cursor:pointer;transition:all .15s}
.am-tab.active{background:#1e293b;color:#f1f5f9;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.am-tab:active{transform:scale(.97)}
.tips-section{margin-bottom:18px}
.tips-section-title{font-size:.62rem;font-weight:800;color:var(--tx4);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.tips-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:5px}
.tips-item{font-size:.83rem;color:var(--tx2);line-height:1.5;padding-left:14px;position:relative}
.tips-item::before{content:"•";position:absolute;left:2px;font-size:.9rem}
.tips-item.hi::before{color:#f59e0b}
.tips-item.nr::before{color:#10b981}
.tips-item.hk::before{color:#7c3aed}
.no-tips{text-align:center;color:#475569;font-size:.82rem;padding:24px 0}

.btn-primary{background:#7c3aed;color:#fff}
/* ===== MAP SVG MARKERS ===== */
.attr-marker{cursor:pointer;transition:all .2s}
.attr-marker:hover{filter:brightness(1.3)}
.attr-marker.checked circle{fill:#10b981;opacity:.8}
.attr-marker.scheduled circle{stroke:#fbbf24;stroke-width:2.5}
.user-dot{fill:#3b82f6;stroke:#fff;stroke-width:2}
.user-pulse{fill:#3b82f6;opacity:.25;animation:pulse 2s infinite}
@keyframes pulse{0%{r:12;opacity:.6}100%{r:28;opacity:0}}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}80%{opacity:1}100%{transform:translateY(420px) rotate(720deg);opacity:0}}
.hidden{display:none!important}
/* ===== PLAN OVERLAY ===== */
.plan-overlay{position:fixed;top:52px;left:0;right:0;bottom:0;background:var(--bg);z-index:90;display:flex;flex-direction:column;overflow:hidden;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.plan-header{display:flex;align-items:center;padding:10px 12px;background:linear-gradient(135deg,#7c3aed,#ec4899);gap:10px;box-shadow:0 2px 8px var(--sh)}
.plan-header h2{font-size:1rem;flex:1;font-weight:700;color:#fff}
.btn-close{background:rgba(255,255,255,.22);border:0;color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:.84rem;font-weight:700}
.btn-close:active{transform:scale(.96)}
.day-tabs{display:flex;gap:8px;overflow-x:auto;padding:14px 12px 12px;background:var(--bg2);border-bottom:1px solid var(--bd);scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex:none;padding:8px 10px;background:var(--btn);border:1px solid var(--bd3);border-radius:10px;color:var(--tx2);font-size:.7rem;cursor:pointer;text-align:center;line-height:1.25;min-width:56px}
.day-tab.active{background:var(--park-color,#7c3aed);border-color:var(--park-color,#7c3aed);color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.15)}
.day-tab .d-dow{font-size:.6rem;opacity:.8;display:block}
.day-tab .d-date{font-weight:800;font-size:.82rem;display:block}
.day-tab .d-park{font-size:.6rem;display:block;margin-top:2px;opacity:.9}
.day-body{flex:1;min-height:0;overflow-y:auto;padding:12px 14px 100px;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
.day-summary{background:var(--bg3);border:1px solid var(--bd2);padding:14px;border-radius:10px;margin-bottom:10px}
.day-summary h3{font-size:1.05rem;margin-bottom:4px;color:var(--txs)}
.day-tips{background:var(--tips-bg);border:1px solid var(--tips-bd);padding:11px 12px;border-radius:8px;font-size:.8rem;color:var(--tips-tx);margin-bottom:12px;line-height:1.5}
.day-tips b{color:var(--tips-b)}
.must-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;align-items:center}
.must-chip{padding:5px 9px;background:linear-gradient(135deg,#7c2d92,#ec4899);color:#fff;border-radius:999px;font-size:.7rem;font-weight:700;display:inline-flex;gap:4px;align-items:center}
.plan-step{display:flex;gap:10px;margin-bottom:8px}
.step-time{flex:0 0 48px;text-align:right;font-weight:800;font-size:.82rem;color:var(--time-c);padding-top:10px;letter-spacing:.3px}
.step-card{flex:1;background:var(--bg3);border:1px solid var(--bd2);padding:10px 12px;border-radius:10px;min-width:0}
.step-card.meal{background:#422006;border-color:#78350f;color:#fde68a}
.step-card.meal .step-head,.step-card.meal .step-sub,.step-card.meal .step-tip-txt{color:#fde68a}
.step-card.show{background:#2e1065;border-color:#7c3aed;color:#e9d5ff}
.step-card.show .step-head,.step-card.show .step-sub,.step-card.show .step-tip-txt{color:#e9d5ff}
.step-card.tip{background:#0c4a6e;border-color:#0891b2;font-size:.82rem;color:#bae6fd;padding:10px 12px}
.step-card.tip .step-head,.step-card.tip .step-sub,.step-card.tip .step-tip-txt{color:#bae6fd}
.step-head{display:flex;gap:8px;align-items:center;font-weight:700;font-size:.9rem;line-height:1.2;color:var(--txs)}
.step-emoji{font-size:1.2rem;flex:none}
.step-sub{font-size:.7rem;color:var(--tx3);margin-top:4px}
.step-tip-txt{font-size:.72rem;color:var(--tip-txt-c);margin-top:4px;font-style:italic;line-height:1.35}
.regen-btn{display:block;width:100%;padding:12px;color:#fff;border:0;border-radius:10px;font-weight:700;font-size:.92rem;margin:4px 0 12px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.regen-btn:active{transform:scale(.97)}
.no-park{text-align:center;padding:40px 20px;color:var(--tx3);font-size:.9rem}
.day-edit-btn{padding:6px 12px;background:var(--bg3);border:1px solid var(--bd2);color:var(--tx3);border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;white-space:nowrap}
.day-edit-btn:active{transform:scale(.96)}
.add-event-form{background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;padding:12px;margin-bottom:10px}
.add-event-form h4{font-size:.75rem;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.add-event-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.add-event-row input,.add-event-row select{flex:1;padding:8px 10px;background:var(--bg-in);border:1px solid var(--bd2);color:var(--tx);border-radius:6px;font-size:.82rem;outline:none;min-width:0}
.add-event-row input:focus,.add-event-row select:focus{border-color:#7c3aed}
.add-event-row input[type=time]{flex:0 0 100px}
.btn-add-ev{padding:8px 14px;background:#7c3aed;border:0;color:#fff;border-radius:6px;font-weight:700;font-size:.82rem;cursor:pointer;white-space:nowrap}
.btn-add-ev:active{transform:scale(.96)}
.step-card .del-ev{float:right;background:none;border:0;color:var(--tx4);font-size:.9rem;cursor:pointer;padding:0 2px;line-height:1}
.step-card .del-ev:hover{color:#ef4444}
.must-checks{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto}
.must-check-row{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg-in);border-radius:6px;cursor:pointer}
.must-check-row input[type=checkbox]{width:16px;height:16px;accent-color:#7c3aed;flex:none}
.must-check-row span{font-size:.8rem;color:var(--tx)}
.day-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:250;padding:0}
.day-modal-box{background:var(--bg3);border-radius:16px 16px 0 0;position:relative;padding:18px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;overflow-x:hidden;border:1px solid var(--bd2)}
.day-modal-box h3{font-size:1rem;margin-bottom:14px;font-weight:700;color:var(--txs)}
.day-modal-box input,.day-modal-box select{max-width:100%;min-width:0;-webkit-appearance:none;appearance:none;box-sizing:border-box;min-height:42px}
.day-modal-box textarea{max-width:100%;min-width:0;box-sizing:border-box}
.day-modal-box select,.day-modal-box textarea{width:100%;padding:8px 10px;background:var(--bg-in);border:1px solid var(--bd2);color:var(--tx);border-radius:6px;font-size:.85rem;margin-bottom:10px;outline:none;font-family:inherit}
.day-modal-box select:focus,.day-modal-box textarea:focus{border-color:#7c3aed}
.day-modal-box label{display:block;font-size:.65rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
/* ===== TOAST ===== */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 16px;border-radius:999px;font-size:.82rem;font-weight:600;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.err{background:#ef4444}
/* ===== TAB BAR ===== */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg4);border-top:1px solid var(--bd);display:flex;z-index:95;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 6px;background:none;border:0;color:var(--tx4);font-size:.56rem;font-weight:700;cursor:pointer;gap:3px;letter-spacing:.3px;text-transform:uppercase;transition:color .15s;-webkit-tap-highlight-color:transparent}
.tab-btn .ti{width:22px;height:22px;display:block}
.tab-btn.active{color:var(--park-color,#ec4899)}
.tab-btn:active{transform:scale(.9)}
/* ===== HOME ===== */
.home-view{padding:14px 14px 80px}
.home-cd{background:linear-gradient(135deg,#0f2460,#1e3a8a,#7c2d92,#0f2460);background-size:300% 300%;border-radius:14px;padding:20px 16px 16px;margin-bottom:14px;text-align:center;animation:cdGrad 6s ease infinite;position:relative;overflow:hidden}
@keyframes cdGrad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.home-cd::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 20%,rgba(255,255,255,.07) 0%,transparent 70%);pointer-events:none}
.cd-units{display:flex;justify-content:center;gap:12px;margin-bottom:8px}
.cd-unit{display:flex;flex-direction:column;align-items:center;min-width:52px}
.cd-val{font-size:clamp(2rem,7vw,3.2rem);font-weight:800;line-height:1;color:#fff;letter-spacing:-1px;font-variant-numeric:tabular-nums;transition:opacity .15s}
.cd-val.flip{animation:cdFlip .25s ease}
@keyframes cdFlip{0%{transform:translateY(-8px);opacity:0}100%{transform:translateY(0);opacity:1}}
.cd-sep{font-size:clamp(1.6rem,5vw,2.6rem);font-weight:800;color:rgba(255,255,255,.4);align-self:flex-start;padding-top:4px;line-height:1}
.cd-lbl{font-size:.6rem;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.6px;margin-top:4px;font-weight:600}
.home-cd .cd-l{font-size:.82rem;color:rgba(255,255,255,.8);margin-top:2px;font-weight:600}
.home-cd .cd-d{font-size:.7rem;color:rgba(255,255,255,.45);margin-top:3px}
.cd-progress{height:3px;background:rgba(255,255,255,.15);border-radius:99px;margin-top:14px;overflow:hidden}
.cd-progress-bar{height:100%;background:linear-gradient(90deg,rgba(255,255,255,.5),rgba(255,255,255,.9));border-radius:99px;transition:width 1s linear}
.cd-big-emoji{font-size:clamp(2.5rem,10vw,4rem);line-height:1;margin-bottom:8px}
.home-cd .cd-msg{font-size:clamp(.9rem,3vw,1.1rem);font-weight:700;color:#fff;margin-bottom:4px}
.home-card{background:var(--bg3);border:1px solid var(--bd2);border-radius:12px;padding:14px;margin-bottom:10px}
.home-card-label{font-size:.62rem;color:var(--tx4);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:10px}
.home-park-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.home-park-dot{width:10px;height:10px;border-radius:50%;flex:none}
.home-park-name{font-size:.98rem;font-weight:700;color:var(--txs)}
.home-park-time{font-size:.78rem;color:var(--tx3);margin-bottom:10px;padding-left:20px}
.home-must{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--tx);padding:5px 0;border-bottom:1px solid var(--bg)}
.home-must:last-of-type{border:0}
.home-action{display:block;width:100%;padding:11px;background:var(--park-color,#7c3aed);border:0;color:#fff;border-radius:8px;font-weight:700;font-size:.88rem;cursor:pointer;margin-top:10px}
.home-action:active{transform:scale(.97)}
.home-stats{display:flex;gap:8px;margin-bottom:10px}
.home-stat{flex:1;background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:border-color .15s}
.home-stat:active{transform:scale(.96)}
.home-stat:hover{border-color:var(--park-color,#7c3aed)}
.home-stat .sn{font-size:1.8rem;font-weight:800;color:var(--txn);line-height:1}
.home-stat .sl{font-size:.6rem;color:var(--tx4);text-transform:uppercase;letter-spacing:.4px;margin-top:4px}
.home-note{background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;padding:11px 13px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.home-note .ni{font-size:1.1rem;flex:none;padding-top:1px}
.home-note .nb{flex:1;font-size:.82rem;color:var(--tx2);line-height:1.45}
.home-note .nl{font-size:.6rem;color:var(--tx4);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;display:block}
.home-tools{display:flex;gap:8px;margin-top:4px}
.home-tool-btn{flex:1;padding:9px 6px;background:var(--bg3);border:1px solid var(--bd2);color:var(--tx3);border-radius:8px;font-size:.72rem;font-weight:600;cursor:pointer;text-align:center}
.home-tool-btn:active{transform:scale(.96)}
.data-menu-item{display:block;width:100%;padding:12px 16px;background:none;border:0;text-align:left;font-size:.85rem;color:var(--tx);cursor:pointer;border-bottom:1px solid var(--bd)}
.data-menu-item:last-child{border:0}
.data-menu-item:hover{background:var(--bg2)}
.alarm-btn{padding:4px 7px;background:none;border:1px solid var(--bd2);border-radius:6px;font-size:.85rem;cursor:pointer;line-height:1;flex:none;transition:all .15s}
.alarm-btn.armed{background:#b45309;border-color:#f59e0b}
.alarm-btn:active{transform:scale(.9)}
/* ===== RESPONSIVE ===== */
@media(min-width:600px){
  .attr-list,.home-view{max-width:580px;margin-left:auto;margin-right:auto;padding-left:20px;padding-right:20px}
  .map-wrap{max-width:580px;margin-left:auto;margin-right:auto}
  .day-body{max-width:580px;margin:0 auto}
  .tab-btn{font-size:.62rem;padding:8px 10px 6px}

  .home-cd .cd-n{font-size:3rem}
}
@media(min-width:900px){

  .map-wrap,.day-body{max-width:680px}
  .tab-bar{justify-content:center}
  .tab-btn{min-width:90px;font-size:.68rem}
  .plan-overlay .day-body{padding-left:24px;padding-right:24px}
}
@media(min-width:1200px){
  .attr-list,.home-view{max-width:760px;padding-left:32px;padding-right:32px}
  .map-wrap,.day-body{max-width:760px}
  .tab-btn{min-width:100px}
  .day-modal-box,.modal-content{max-width:540px}
}
.ico{width:16px;height:16px;display:inline-block;vertical-align:middle;flex:none;stroke:currentColor}
.ico-sm{width:13px;height:13px}
.ico-lg{width:20px;height:20px}
.ico-xl{width:28px;height:28px}
svg.ico,svg.ico-sm,svg.ico-lg,svg.ico-xl{fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;overflow:visible}
</style>

<body>

<div id="dataMenu" style="display:none;position:fixed;top:52px;right:10px;z-index:200;background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;box-shadow:0 4px 16px var(--sh);min-width:160px;overflow:hidden">

<main>

    <button class="gps-btn" id="gpsBtn" title="Ativar GPS"><svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.68 2 6 4.68 6 8c0 5.25 6 13 6 13s6-7.75 6-13c0-3.32-2.68-6-6-6z"/><circle cx="12" cy="8" r="2"/></svg> GPS</button>

<script>
// ====== SVG ICON SYSTEM ======
function ico(name,cls='ico'){
  const p={a:`class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"`};
  const d={

function startConfetti(containerId){const container=document.getElementById(containerId);if(!container) return;container.innerHTML='';const colors=['#fbbf24','#ec4899','#a855f7','#3b82f6','#10b981','#f43f5e','#fff'];for(let i=0;i<38;i++){const el=document.createElement('div');const size=Math.random()*8+5;const color=colors[Math.floor(Math.random()*colors.length)];const left=Math.random()*100;const delay=Math.random()*1.8;const dur=Math.random()*2+2;const rotate=Math.random()*360;el.style.cssText=`position:absolute;width:${size}px;height:${size}px;background:${color};border-radius:${Math.random()>.5?'50%':'2px'};left:${left}%;top:-10%;opacity:0;animation:confettiFall ${dur}s ${delay}s ease-in forwards;transform:rotate(${rotate}deg);`;container.appendChild(el);}}

function iconOf(id){return ICONS[id]||{i:'📍',s:''}}
function attrTypeIco(id,cls){
  // Look up the attraction type from all parks and return an SVG icon
  for(const p of PARKS){
    const a=p.attractions.find(x=>x.id===id);
    if(a){
      const typeIcoMap={thrill:'lightning',family:'sparkles',kids:'kids',water:'wave',show:'masks'};
      return ico(typeIcoMap[a.type]||'pin',cls||'ico');
    }
  }
  return ico('pin',cls||'ico');
}

function loadState(){
  try{
    const s=localStorage.getItem(STORAGE_KEY);
    if(s) return JSON.parse(s);
  }catch(e){}
  return {currentPark:null, data:{}};
}
function saveState(){
  try{
    state.currentPark=currentPark;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){toast('Erro ao salvar: '+e.message,true)}
}
function attrState(parkId,attrId){
  if(!state.data[parkId]) state.data[parkId]={};
  if(!state.data[parkId][attrId]) state.data[parkId][attrId]={done:false,time:'',queue:'',notes:''};
  return state.data[parkId][attrId];
}

function renderStats(){

const mapFilter={attr:true,wc:true,ts:false,qs:false};
function applyMapFilter(svgEl){
  if(!svgEl) return;
  svgEl.querySelectorAll('.attr-marker').forEach(el=>el.style.display=mapFilter.attr?'':'none');
  svgEl.querySelectorAll('.wc-marker').forEach(el=>el.style.display=mapFilter.wc?'':'none');
  svgEl.querySelectorAll('.ts-marker').forEach(el=>el.style.display=mapFilter.ts?'':'none');
  svgEl.querySelectorAll('.qs-marker').forEach(el=>el.style.display=mapFilter.qs?'':'none');
}
function toggleMapFilter(type){
  mapFilter[type]=!mapFilter[type];
  document.querySelectorAll('[data-mf="'+type+'"]').forEach(btn=>btn.classList.toggle('active',mapFilter[type]));
  applyMapFilter(document.getElementById('parkMap'));
  const fsSvg=document.getElementById('mapFsSvg');
  if(fsSvg && fsSvg.innerHTML) applyMapFilter(fsSvg);
}

function pathCenter(path){
  // naive center: average of coordinate pairs
  const nums=path.match(/-?\d+\.?\d*/g).map(parseFloat);
  let sx=0,sy=0,n=0;
  for(let i=0;i<nums.length;i+=2){sx+=nums[i];sy+=nums[i+1];n++}
  return {x:sx/n,y:sy/n};
}
function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c])}

function latLngToXY(park, lat, lng){
  const b=park.bounds;
  if(lat<b.minLat-0.003||lat>b.maxLat+0.003||lng<b.minLng-0.003||lng>b.maxLng+0.003) return null;
  const x=((lng-b.minLng)/(b.maxLng-b.minLng))*400;
  const y=400-((lat-b.minLat)/(b.maxLat-b.minLat))*400;
  return {x:Math.max(5,Math.min(395,x)), y:Math.max(5,Math.min(395,y))};
}

function haversine(lat1,lng1,lat2,lng2){
  const R=6371000;const toRad=v=>v*Math.PI/180;
  const dLat=toRad(lat2-lat1),dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function renderList(){
  const p=getPark(currentPark);
  const container=document.getElementById('attrContainer');
  const q=searchQuery.toLowerCase().trim();
  let items=p.attractions.slice();
  if(q) items=items.filter(a=>
    a.id.toLowerCase()===q ||
    a.name.toLowerCase().includes(q) ||
    a.land.toLowerCase().includes(q)
  );
  if(activeFilter==='pending') items=items.filter(a=>!attrState(p.id,a.id).done);
  if(activeFilter==='scheduled') items=items.filter(a=>attrState(p.id,a.id).time);
  if(activeFilter==='done') items=items.filter(a=>attrState(p.id,a.id).done);
  // Sort: scheduled by time asc, then done last
  items.sort((a,b)=>{
    const sa=attrState(p.id,a.id), sb=attrState(p.id,b.id);
    if(sa.done!==sb.done) return sa.done?1:-1;
    if(sa.time && sb.time) return sa.time.localeCompare(sb.time);
    if(sa.time) return -1;
    if(sb.time) return 1;
    return a.name.localeCompare(b.name);
  });

  if(items.length===0){
    container.innerHTML='<div style="text-align:center;color:#64748b;padding:40px 0;font-size:.9rem">Nenhuma atra\u00e7\u00e3o encontrada.</div>';
    return;
  }

  container.innerHTML=items.map(a=>{
    const s=attrState(p.id,a.id);
    let dist='';
    if(currentPosition){
      const d=haversine(currentPosition.lat,currentPosition.lng,a.lat,a.lng);
      const km=d/1000;
      const txt = d<500?`${Math.round(d)}m`:`${km.toFixed(1)}km`;
      dist=`<span class="distance ${d<500?'near':''}">${txt}</span>`;
    }
    const closedBanner = a.closed ? `<div style="background:#7f1d1d;color:#fecaca;padding:6px 10px;border-radius:6px;font-size:.75rem;font-weight:700;margin-bottom:8px">${escapeHtml(a.closedNote||'Fechada')}</div>` : '';
    const prio = (state.priorities?.[p.id]||{})[a.id] || '';
    const prioRow = a.closed ? '' : `<div class="prio-row">
      <button class="prio-btn ${prio==='must'?'active':''}" data-p="must" data-prio="${a.id}">${ico('star','ico-sm')} Must</button>
      <button class="prio-btn ${prio==='skip'?'active':''}" data-p="skip" data-prio="${a.id}">${ico('skip','ico-sm')} Pular</button>
    </div>`;
    return `
      <div class="attr-card ${s.done?'done':''} ${prio==='skip'?'skipped':''}" data-card="${a.id}">
        ${closedBanner}
        <div class="attr-row1">
          <button class="attr-check ${s.done?'checked':''}" data-check="${a.id}" aria-label="Marcar como feito"></button>
          <div class="attr-info">
            <div class="attr-name">${a.closed?`<svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="#fca5a5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> `:''}${escapeHtml(a.name)}</div>
            <div class="attr-meta">
              <span class="attr-tag ${a.type}">${labelType(a.type)}</span>
              <span class="attr-land">${escapeHtml(a.land)}</span>
              ${dist}
            </div>
          </div>
        </div>
        ${prioRow}
        <div class="attr-row2">
          <div class="attr-row2-top">
            <div class="field">
              <label style="display:flex;align-items:center;gap:4px">${ico('clock','ico-sm')} Hora na fila</label>
              <div style="display:flex;gap:4px;align-items:center">
                <input type="time" data-time="${a.id}" value="${s.time||''}" style="flex:1;min-width:0">
                ${s.time?`<button class="alarm-btn ${((state.alarms[p.id]||{})[a.id])?'armed':''}" data-alarm="${a.id}" title="Alarme">${ico((state.alarms[p.id]||{})[a.id]?'bell':'bellOff','ico-sm')}</button>`:''}
              </div>
            </div>
            <div class="field">
              <label style="display:flex;align-items:center;gap:4px">${ico('hourglass','ico-sm')} Espera estimada</label>
              <input type="text" inputmode="numeric" placeholder="ex: 45 min" data-queue="${a.id}" value="${escapeHtml(s.queue||'')}">
            </div>
          </div>
          <div class="field full">
            <label style="display:flex;align-items:center;gap:4px">${ico('notes','ico-sm')} Notas</label>
            <textarea class="attr-notes" data-notes="${a.id}" placeholder="Lightning Lane, quem vai, dicas...">${escapeHtml(s.notes||'')}</textarea>
          </div>
        </div>
      </div>
    `;
  }).join('');

  // Bind
  container.querySelectorAll('[data-check]').forEach(el=>{
    el.onclick=()=>{
      const id=el.dataset.check;
      const s=attrState(currentPark,id);
      s.done=!s.done;
      saveState();renderAll();
    };

// ====== PLAN / OPTIMIZER ======
function cmpTime(a,b){return (a||'').localeCompare(b||'')}
function timeToMin(t){if(!t) return -1;const [h,m]=t.split(':').map(Number);return h*60+m;}
function waitMultiplier(t){
  const m=timeToMin(t);
  if(m<9*60)   return 0.10; // rope drop
  if(m<11*60)  return 0.50; // manhã cedo
  if(m<14*60)  return 1.00; // pico
  if(m<17*60)  return 0.80; // tarde
  if(m<19*60)  return 0.55; // fim de tarde
  return 0.35;               // noite
}
function calcSlot(attrId, parkId, t){
  const userQ=parseInt((attrState(parkId,attrId)||{}).queue)||0;
  const d=WAIT_DATA[attrId]||{w:40,d:4};
  const wait=userQ>0?userQ:Math.round(d.w*waitMultiplier(t));
  return Math.max(15, wait+d.d+10); // mín 15 min por slot
}
function skipBlocked(t,evs){
  let changed=true;
  while(changed){
    changed=false;
    const tMin=timeToMin(t);
    for(const ev of evs){
      if(!ev.time) continue;
      const s=timeToMin(ev.time), e=s+(ev.duration||30);
      if(tMin>=s && tMin<e){t=addMin(ev.time,ev.duration||30);changed=true;break;}
    }
  }
  return t;
}
function addMin(t,m){
  if(!t) return t;
  const [h,mi]=t.split(':').map(Number);
  let total=h*60+mi+m;
  if(total<0) total+=24*60;
  const H=Math.floor(total/60)%24,M=total%60;
  return String(H).padStart(2,'0')+':'+String(M).padStart(2,'0');
}
function formatDate(iso){
  const [y,m,d]=iso.split('-');
  return `${d}/${m}`;
}
function pickProximity(pool,used,steps){
  const last=[...steps].reverse().find(s=>s.attr);
  const lastPos=last?{x:last.attr.x,y:last.attr.y}:null;
  const cands=pool.filter(a=>!used.has(a.id));
  if(!cands.length) return null;
  return cands.slice().sort((a,b)=>{
    const da=lastPos?Math.hypot(a.x-lastPos.x,a.y-lastPos.y):0;
    const db=lastPos?Math.hypot(b.x-lastPos.x,b.y-lastPos.y):0;
    const sa=a.pri*250-da*0.6;
    const sb=b.pri*250-db*0.6;
    return sb-sa;
  })[0];
}

function buildPlan(day){
  if(!day.parkId || !day.open || !day.close) return [];
  const park=getPark(day.parkId);
  const opt=OPT[day.parkId]||{};
  const prios=(state.priorities||{})[day.parkId]||{};
  const musts=new Set(day.musts||[]);
  const timedEvs=(day.events||[]).filter(e=>e.time);

  // Atrações com horário marcado na lista → blocos fixos
  const scheduledAttrs=park.attractions.filter(a=>{
    const s=attrState(day.parkId,a.id);
    return s.time && !a.closed;
  });
  const scheduledBlocks=scheduledAttrs.map(a=>{
    const s=attrState(day.parkId,a.id);
    return {time:s.time, duration:calcSlot(a.id,day.parkId,s.time), attrId:a.id};
  });
  const allBlocked=[...timedEvs,...scheduledBlocks];

  const pool=park.attractions.filter(a=>prios[a.id]!=='skip' && !a.closed).map(a=>({
    ...a,
    pri: musts.has(a.id)?4:(prios[a.id]==='must'?3:1),
    rope:(opt.ropeOrder||[]).indexOf(a.id),
    night:(opt.nightRides||[]).includes(a.id)
  }));

  const steps=[];
  const used=new Set();

  // Marca atrações já agendadas como usadas e injeta no plano
  scheduledAttrs.forEach(a=>{
    const s=attrState(day.parkId,a.id);
    const estWait=parseInt(s.queue)||Math.round((WAIT_DATA[a.id]||{w:0}).w*waitMultiplier(s.time));
    steps.push({time:s.time,kind:'ride',attr:a,wait:estWait,rideDur:(WAIT_DATA[a.id]||{d:4}).d,tip:'Agendado por você na lista'});
    used.add(a.id);
  });

  steps.push({time:addMin(day.open,-30),kind:'tip',text:(day.earlyEntry?'Wyndham Early Entry: portões abrem 30min antes do público geral':'Chegue cedo — fila de entrada começa aqui')});
  steps.push({time:addMin(day.open,-15),kind:'tip',text:'Coma ao longo do dia — snacks, quick service, popcorn, pretzels. Sem horário fixo de refeição.'});

  const closedOnes = park.attractions.filter(a=>a.closed);
  if(closedOnes.length){
    steps.push({time:addMin(day.open,-10),kind:'tip',text:'Fechadas hoje: '+closedOnes.map(a=>a.name).join(' · ')});
  }

  const ropePool=[];
  pool.filter(a=>musts.has(a.id)).forEach(a=>ropePool.push(a));
  (opt.ropeOrder||[]).forEach(id=>{
    const a=pool.find(x=>x.id===id);
    if(a && !ropePool.find(x=>x.id===a.id)) ropePool.push(a);
  });

  let t=skipBlocked(day.open,allBlocked);
  for(let i=0,added=0;i<ropePool.length && added<4 && cmpTime(t,day.close)<0;i++){
    const a=ropePool[i];
    if(used.has(a.id)) continue;
    const slot=calcSlot(a.id,day.parkId,t);
    const w=WAIT_DATA[a.id]||{w:0};
    const estWait=Math.round(w.w*waitMultiplier(t));
    steps.push({
      time:t,kind:'ride',attr:a,wait:estWait,rideDur:(WAIT_DATA[a.id]||{d:4}).d,
      tip:added===0?'Vá DIRETO — prioridade absoluta, espera mínima':'Rope drop — janela de ouro'
    });
    used.add(a.id);
    added++;
    t=skipBlocked(addMin(t,slot),allBlocked);
  }

  const afternoonStart='14:00';
  while(cmpTime(t,afternoonStart)<0 && cmpTime(t,day.close)<0){
    const next=pickProximity(pool,used,steps);
    if(!next) break;
    const slot=calcSlot(next.id,day.parkId,t);
    const estWait=Math.round((WAIT_DATA[next.id]||{w:40}).w*waitMultiplier(t));
    const tip=cmpTime(t,'12:00')>=0?'Meio-dia — filas no pico':'Manhã — filas subindo';
    steps.push({time:t,kind:'ride',attr:next,wait:estWait,rideDur:(WAIT_DATA[next.id]||{d:4}).d,tip});
    used.add(next.id);
    t=skipBlocked(addMin(t,slot),allBlocked);
  }

  const nightStart=cmpTime(day.close,'19:30')<0?addMin(day.close,-90):'19:00';
  while(cmpTime(t,nightStart)<0 && cmpTime(t,day.close)<0){
    const next=pickProximity(pool,used,steps);
    if(!next) break;
    const slot=calcSlot(next.id,day.parkId,t);
    const estWait=Math.round((WAIT_DATA[next.id]||{w:40}).w*waitMultiplier(t));
    const tip=(cmpTime(t,'14:00')>=0&&cmpTime(t,'16:30')<=0)?'Tarde quente — prefira atrações indoor':'Tarde';
    steps.push({time:t,kind:'ride',attr:next,wait:estWait,rideDur:(WAIT_DATA[next.id]||{d:4}).d,tip});
    used.add(next.id);
    t=skipBlocked(addMin(t,slot),allBlocked);
  }

  for(const id of (opt.nightRides||[])){
    const a=pool.find(x=>x.id===id);
    if(!a||used.has(a.id)) continue;
    if(cmpTime(t,day.close)>=0) break;
    const slot=calcSlot(a.id,day.parkId,t);
    const estWait=Math.round((WAIT_DATA[a.id]||{w:20}).w*waitMultiplier(t));
    steps.push({time:t,kind:'ride',attr:a,wait:estWait,rideDur:(WAIT_DATA[a.id]||{d:4}).d,tip:'Noite — espera cai bastante'});
    used.add(a.id);
    t=skipBlocked(addMin(t,slot),allBlocked);
  }

  while(cmpTime(t,day.close)<0){
    const next=pickProximity(pool,used,steps);
    if(!next) break;
    const slot=calcSlot(next.id,day.parkId,t);
    const estWait=Math.round((WAIT_DATA[next.id]||{w:20}).w*waitMultiplier(t));
    steps.push({time:t,kind:'ride',attr:next,wait:estWait,tip:'Noite — filas curtas'});
    used.add(next.id);
    t=skipBlocked(addMin(t,slot),allBlocked);
  }

  // Shows
  (opt.shows||[]).forEach(s=>{
    const attr=park.attractions.find(a=>a.id===s.id);
    if(!attr) return;
    if(cmpTime(s.time,day.close)>0) return;
    steps.push({time:s.time,kind:'show',attr,tip:s.note||'Chegue 20 min antes para pegar lugar bom'});
  });

  steps.push({time:day.close,kind:'tip',text:'Parque fecha — bom dia!'});
  steps.sort((a,b)=>cmpTime(a.time,b.time));
  return steps;
}

function renderSteps(plan,park){
  const el=document.getElementById('planSteps');
  const day=state.trip[currentDay];

  const customEvs=(day.events||[]).map(e=>{
    const t=EV_TYPES.find(x=>x.v===e.type)||EV_TYPES[0];
    return {time:e.time,kind:e.type,custom:true,evId:e.id,text:e.text,emoji:t.emoji,icoName:t.ico,cls:e.type==='meal'?'meal':e.type==='tip'?'tip':e.type==='show'?'show':''};
  });

  const genEvs=(state.generalEvents||[]).filter(e=>e.date===day.date).map(e=>{
    const t=EV_TYPES.find(x=>x.v===e.type)||EV_TYPES[0];
    return {time:e.time||'',kind:e.type,gen:true,evId:e.id,text:e.text,emoji:t.emoji||'📌',cls:e.type==='meal'?'meal':e.type==='tip'?'tip':e.type==='show'?'show':''};
  });

  const allSteps=[...(plan||[]),...customEvs,...genEvs].sort((a,b)=>((a.time||'')).localeCompare(b.time||''));

  if(!allSteps.length){
    el.innerHTML='<div class="no-park" style="padding-bottom:0">Nenhum evento para este dia.</div>';
    return;
  }

  el.innerHTML=allSteps.map(s=>{
    const delBtn=(s.custom||s.gen)?`<button class="del-ev" data-evid="${s.evId}" data-evgen="${s.gen?'1':''}" title="Remover">✕</button>`:'';
    if(s.kind==='tip'&&!s.custom&&!s.gen) return `<div class="plan-step"><div class="step-time">${s.time||''}</div><div class="step-card tip">${escapeHtml(s.text)}</div></div>`;
    if(s.gen){
      const ev=(state.generalEvents||[]).find(e=>e.id===s.evId);
      if(!ev) return '';
      const dateLabel=ev.date?`${ev.date.slice(8,10)}/${ev.date.slice(5,7)}`:'—';
      return genEventCard(ev,{leftLabel:dateLabel});
    }
    if(s.custom){
      const ev=(state.trip[currentDay].events||[]).find(e=>e.id===s.evId);
      const dur=ev&&ev.duration?`<span style="font-size:.68rem;color:var(--tx3);margin-left:4px">· ${ev.duration} min</span>`:'';
      return `<div class="plan-step">
        <div class="step-time">${s.time||'—'}</div>
        <div class="step-card ${s.cls}">
          ${delBtn}
          <div class="step-head"><span class="step-emoji">${s.emoji}</span>${escapeHtml(s.text)}${dur}</div>
        </div>
      </div>`;
    }
    if(s.kind==='meal') return `<div class="plan-step"><div class="step-time">${s.time}</div><div class="step-card meal">${escapeHtml(s.text)}</div></div>`;
    const icon=iconOf(s.attr.id);
    const cls=s.kind==='show'?'show':'';
    const sc=attrState(park?park.id:'',s.attr.id);
    const doneTag=sc.done?`<span style="display:inline-flex;align-items:center;color:#10b981;margin-left:6px">${ico('check','ico-sm')}</span>`:'';
    const timeTag=sc.time?`<span style="display:inline-flex;align-items:center;gap:3px;font-size:.68rem;color:#fbbf24;margin-left:6px">${ico('clock','ico-sm')} ${sc.time}</span>`:'';
    return `<div class="plan-step">
      <div class="step-time">${s.time}</div>
      <div class="step-card ${cls}" style="border-left:3px solid ${park?park.color:'#7c3aed'};cursor:pointer" data-attrid="${s.attr.id}" data-parkid="${park?park.id:''}">
        <div class="step-head"><span class="step-emoji">${iconOf(s.attr.id).i}</span>${escapeHtml(s.attr.name)}${doneTag}${timeTag}</div>
        <div class="step-sub">${escapeHtml(s.attr.land)}${s.wait>0?` · ${ico('hourglass','ico-sm')} ${s.wait} min fila`:''}${s.rideDur?` · ${ico('coaster','ico-sm')} ${s.rideDur} min`:''}${s.wait>0||s.rideDur?` · total ~${(s.wait||0)+s.rideDur+10} min`:''}</div>
        ${s.tip?`<div class="step-tip-txt">${escapeHtml(s.tip)}</div>`:''}
      </div>
    </div>`;
  }).join('');

  el.querySelectorAll('[data-attrid]').forEach(card=>{
    card.onclick=()=>openAttrModal(card.dataset.parkid, card.dataset.attrid);
  });
  el.querySelectorAll('[data-edit-gen]').forEach(card=>{
    card.onclick=(e)=>{ if(!e.target.classList.contains('del-ev')) openEditGenEventModal(+card.dataset.editGen); };
  });
  el.querySelectorAll('.del-ev').forEach(btn=>{
    btn.onclick=(e)=>{
      e.stopPropagation();
      const id=+btn.dataset.evid;
      if(btn.dataset.evgen){
        state.generalEvents=(state.generalEvents||[]).filter(ev=>ev.id!==id);
        saveState();renderDayBody();renderHome();
      } else {
        state.trip[currentDay].events=(state.trip[currentDay].events||[]).filter(ev=>ev.id!==id);
        saveState();renderDayBody();
      }
      toast('Evento removido');
    };
  });
}

// ====== ALARMS ======
function toggleAlarm(parkId, attrId){
  if(!state.alarms[parkId]) state.alarms[parkId]={};
  const armed=state.alarms[parkId][attrId];
  if(armed){
    delete state.alarms[parkId][attrId];
    saveState();renderList();toast('Alarme removido');
    return;
  }
  const s=attrState(parkId,attrId);
  if(!s.time){toast('Defina um horário primeiro',true);return;}
  const requestAndArm=()=>{
    state.alarms[parkId][attrId]=true;
    saveState();renderList();
    const attr=getPark(parkId).attractions.find(a=>a.id===attrId);
    toast(`Alarme às ${s.time} — ${attr?.name||attrId}`);
  };
  if(Notification.permission==='granted'){ requestAndArm(); }
  else if(Notification.permission!=='denied'){
    Notification.requestPermission().then(p=>{
      if(p==='granted') requestAndArm();
      else{ state.alarms[parkId][attrId]=true;saveState();renderList();toast('Alarme ativo (notificação negada — só vai aparecer no app)'); }
    });
  } else {
    requestAndArm();
    toast('Alarme ativo (notificações bloqueadas — aviso aparecerá no app)');
  }
}

function checkAlarms(){
  const now=new Date();
  const cur=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  PARKS.forEach(p=>{
    const parkAlarms=state.alarms[p.id]||{};
    Object.keys(parkAlarms).forEach(attrId=>{
      const s=attrState(p.id,attrId);
      if(s.time===cur){
        const attr=p.attractions.find(a=>a.id===attrId);
        const name=attr?.name||attrId;
        // Fire
        if(Notification.permission==='granted'){
          new Notification('Orlando Trip — Hora da fila!',{body:`${name}\n${p.name}`});
        }
        toast(`ALARME: ${name}`,false);
        delete state.alarms[p.id][attrId];
        saveState();
        if(currentTab==='list') renderList();
      }
    });
  });
}

// ====== GPS SIMULATION ======
function simulateGPS(){
  const p=getPark(currentPark);
  // Posição simulada: centro do parque atual
  const lat=(p.bounds.minLat+p.bounds.maxLat)/2;
  const lng=(p.bounds.minLng+p.bounds.maxLng)/2;
  currentPosition={lat,lng,acc:5,simulated:true};
  const btn=document.getElementById('gpsBtn');
  const status=document.getElementById('gpsStatus');
  btn.classList.add('active');
  status.className='gps-status ok';
  status.innerHTML=`✅ <b>Simulação GPS</b> — você está no centro do ${p.name}. Precisão ~5m. <button onclick="stopSimGPS()" style="margin-left:8px;padding:2px 8px;background:#ef4444;border:0;color:#fff;border-radius:4px;font-size:.7rem;cursor:pointer">Parar</button>`;
  renderAll();
  // Move o ponto simulado suavemente
  window._simInterval=setInterval(()=>{
    const jitter=0.0001;
    currentPosition.lat+=((Math.random()-.5)*jitter);
    currentPosition.lng+=((Math.random()-.5)*jitter);
    if(currentTab==='map') renderMap();
    if(currentTab==='list') renderList();
  },1500);
}
function stopSimGPS(){
  clearInterval(window._simInterval);
  currentPosition=null;
  const btn=document.getElementById('gpsBtn');
  const status=document.getElementById('gpsStatus');
  btn.classList.remove('active');
  status.className='gps-status';
  status.textContent='GPS desativado. Toque em GPS para mostrar sua localização.';
  renderAll();
}

// ====== GPS ======
function toggleGPS(){
  const btn=document.getElementById('gpsBtn');
  const status=document.getElementById('gpsStatus');
  if(gpsWatchId!==null){
    navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId=null;
    currentPosition=null;
    btn.classList.remove('active');
    status.className='gps-status';
    status.textContent='GPS desativado. Toque em GPS para mostrar sua localização.';
    renderAll();
    return;
  }
  if(!navigator.geolocation){
    status.className='gps-status err';
    status.textContent='Seu navegador não suporta geolocalização.';
    return;
  }
  status.className='gps-status';
  status.textContent='Obtendo localização...';
  gpsWatchId=navigator.geolocation.watchPosition(pos=>{
    currentPosition={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:pos.coords.accuracy};
    btn.classList.add('active');
    const p=getPark(currentPark);
    const inside=latLngToXY(p, currentPosition.lat, currentPosition.lng);
    status.className='gps-status ok';
    status.innerHTML=inside
      ? `Você está no ${p.name}. Precisão ~${Math.round(pos.coords.accuracy)}m.`
      : `Localização ativa (fora do ${p.name}). Precisão ~${Math.round(pos.coords.accuracy)}m. Distâncias mostradas na lista.`;
    renderAll();
  }, err=>{
    status.className='gps-status err';
    status.textContent='Erro GPS: '+err.message+' (habilite permissão de localização no navegador)';
    btn.classList.remove('active');
    gpsWatchId=null;
  }, {enableHighAccuracy:true, maximumAge:5000, timeout:15000});
}

// ====== MAPA INLINE ZOOM/PAN ======
(function(){
  const wrap=document.getElementById('mapZoomWrap');
  const svg=document.getElementById('parkMap');
  if(!wrap||!svg) return;
  let scale=1,tx=0,ty=0;
  let dragging=false,lastX=0,lastY=0;
  let lastDist=0,lastTap=0;
  let tapStartX=0,tapStartY=0,tapMoved=false;

  function applyT(){
    svg.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  }
  function clamp(){
    const W=wrap.offsetWidth,H=wrap.offsetHeight;
    const sw=W*scale,sh=H*scale;
    tx=Math.min(0,Math.max(W-sw,tx));
    ty=Math.min(0,Math.max(H-sh,ty));
  }
  function zoomAt(cx,cy,ns){
    ns=Math.min(5,Math.max(1,ns));
    tx=cx-(cx-tx)*(ns/scale);
    ty=cy-(cy-ty)*(ns/scale);
    scale=ns;
    clamp();
    applyT();
  }
  function resetT(){scale=1;tx=0;ty=0;applyT();}

  function dist(a,b){return Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);}
  function mid(a,b){return{x:(a.clientX+b.clientX)/2,y:(b.clientY+a.clientY)/2};}

  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      e.preventDefault();
      lastDist=dist(e.touches[0],e.touches[1]);
      tapMoved=true;
    } else if(e.touches.length===1){
      if(scale>1) e.preventDefault();
      lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
      tapStartX=lastX;tapStartY=lastY;
      dragging=true;tapMoved=false;
      const now=Date.now();if(now-lastTap<300) resetT();lastTap=now;
    }
  },{passive:false});

  wrap.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const d=dist(e.touches[0],e.touches[1]);
      if(lastDist>0){
        const m=mid(e.touches[0],e.touches[1]);
        const r=wrap.getBoundingClientRect();
        zoomAt(m.x-r.left,m.y-r.top,scale*(d/lastDist));
      }
      lastDist=d;dragging=false;
    } else if(e.touches.length===1&&dragging&&scale>1){
      e.preventDefault();
      tx+=e.touches[0].clientX-lastX;ty+=e.touches[0].clientY-lastY;
      lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
      clamp();applyT();
    }
    if(e.touches.length===1){
      const dx=e.touches[0].clientX-tapStartX,dy=e.touches[0].clientY-tapStartY;
      if(Math.abs(dx)>6||Math.abs(dy)>6) tapMoved=true;
    }
  },{passive:false});

  wrap.addEventListener('touchend',e=>{
    if(e.touches.length<2) lastDist=0;
    if(e.touches.length===0){
      dragging=false;
      // tap simples: roteia para marcador
      if(!tapMoved&&e.changedTouches.length===1&&Date.now()-lastTap<350){
        const t=e.changedTouches[0];
        const el=document.elementFromPoint(t.clientX,t.clientY);
        const marker=el?.closest('[data-attr],[data-rest],[data-wc]');
        if(marker){
          if(marker.dataset.attr) marker.onclick&&marker.onclick(new MouseEvent('click'));
          else if(marker.dataset.rest) openRestaurantSheet(marker.dataset.rest,currentPark);
          else if(marker.dataset.wc) {}
        }
      }
    }
  });

  // Scroll com wheel no desktop
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    const r=wrap.getBoundingClientRect();
    zoomAt(e.clientX-r.left,e.clientY-r.top,scale*(e.deltaY<0?1.15:0.87));
  },{passive:false});

  // Expõe reset para uso externo (ex: ao trocar de parque)
  window._resetInlineMap=resetT;
})();

      tapMoved=true;
    } else if(e.touches.length===1){
      lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;dragging=true;
      tapStartX=e.touches[0].clientX;tapStartY=e.touches[0].clientY;
      tapStartT=Date.now();tapMoved=false;
      const now=Date.now();if(now-lastTap<300) resetT();lastTap=now;
    }
  },{passive:false});

  fsContainer.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1){
      const dx=e.touches[0].clientX-tapStartX,dy=e.touches[0].clientY-tapStartY;
      if(Math.abs(dx)>6||Math.abs(dy)>6) tapMoved=true;
    }
    if(e.touches.length===2){
      const d=touchDist(e.touches[0],e.touches[1]);
      if(lastDist>0){
        const mid=midpoint(e.touches[0],e.touches[1]);
        const rect=fsContainer.getBoundingClientRect();
        zoomAt(mid.x-rect.left,mid.y-rect.top,scale*(d/lastDist));
      }
      lastDist=d;dragging=false;
    } else if(e.touches.length===1&&dragging){
      tx+=e.touches[0].clientX-lastX;ty+=e.touches[0].clientY-lastY;
      lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;applyT();
    }
  },{passive:false});

  fsContainer.addEventListener('touchend',e=>{
    if(e.touches.length<2) lastDist=0;
    if(e.touches.length===0){
      dragging=false;
      // Detecta tap (sem movimento, < 300ms)
      if(!tapMoved && e.changedTouches.length===1 && Date.now()-tapStartT<350){
        const t=e.changedTouches[0];
        const el=document.elementFromPoint(t.clientX,t.clientY);
        const marker=el?.closest('[data-attr],[data-rest],[data-wc]');
        if(marker){
          if(marker.dataset.attr){
            const p=getPark(currentPark);
            const a=p?.attractions.find(x=>x.id===marker.dataset.attr);
            const sub=a?(TYPE_LABEL[a.type]||a.type)+(a.closed?' · Fechada':''):'';
            showFsInfo(a?a.name:marker.dataset.attr,sub,marker.dataset.attr);
          } else if(marker.dataset.rest){
            openRestaurantSheet(marker.dataset.rest,currentPark);
          } else if(marker.dataset.wc){
            showFsInfo('Banheiro','🚻',null);
          }
        } else {
          fsInfo.classList.add('hidden');
        }
      }
    }
  });

  fsContainer.addEventListener('wheel',e=>{
    e.preventDefault();
    const rect=fsContainer.getBoundingClientRect();
    zoomAt(e.clientX-rect.left,e.clientY-rect.top,scale*(e.deltaY<0?1.15:0.87));
  },{passive:false});

  fsContainer.addEventListener('mousedown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;});
  fsContainer.addEventListener('mousemove',e=>{
    if(!dragging) return;
    tx+=e.clientX-lastX;ty+=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;applyT();
  });
  fsContainer.addEventListener('mouseup',()=>dragging=false);
  fsContainer.addEventListener('mouseleave',()=>dragging=false);
  fsContainer.addEventListener('dblclick',resetT);

  function showFsInfo(name,sub,attrId){
    fsInfoName.textContent=name;
    fsInfoSub.textContent=sub;
    _pendingAttr=attrId||null;
    if(attrId){ fsInfoBtn.classList.remove('hidden'); }
    else { fsInfoBtn.classList.add('hidden'); }
    fsInfo.classList.remove('hidden');
  }

  if(fsInfoBtn) fsInfoBtn.onclick=()=>{
    if(_pendingAttr){
      const attr=_pendingAttr;
      closeFs();
      requestAnimationFrame(()=>openAttrModal(currentPark,attr));
    }
  };

  const TYPE_LABEL={'thrill':'🎢 Radical','family':'👨‍👩‍👧 Família','kids':'👧 Kids','water':'💦 Aquática','show':'🎭 Show','tour':'🚶 Tour'};

  function openFs(){
    const p=getPark(currentPark);
    fsTitle.textContent=p.name;
    fsSvg.innerHTML=document.getElementById('parkMap').innerHTML;
    fsSvg.setAttribute('viewBox','0 0 400 400');
    overlay.classList.remove('hidden');
    fsInfo.classList.add('hidden');
    document.body.style.overflow='hidden';
    requestAnimationFrame(()=>{
      const rect=fsContainer.getBoundingClientRect();
      scale=rect.width/400;
      tx=0; ty=0;
      applyT();
    });
    // Attraction markers → show info bar on tap
    fsSvg.querySelectorAll('[data-attr]').forEach(el=>{
      el.style.cursor='pointer';
      el.onclick=(e)=>{
        e.stopPropagation();
        const a=p.attractions.find(x=>x.id===el.dataset.attr);
        const sub=a?(TYPE_LABEL[a.type]||a.type)+(a.closed?' · Fechada':''):'';
        showFsInfo(a?a.name:el.dataset.attr, sub, el.dataset.attr);
      };
    });
    // Restaurant markers → bottom sheet via tap (handled in touchend)
    // onclick para desktop
    fsSvg.querySelectorAll('[data-rest]').forEach(el=>{
      el.style.cursor='pointer';
      el.onclick=(e)=>{ e.stopPropagation(); openRestaurantSheet(el.dataset.rest,currentPark); };
    });
    // WC markers → show info bar
    fsSvg.querySelectorAll('[data-wc]').forEach(el=>{
      el.onclick=(e)=>{ e.stopPropagation(); showFsInfo('Banheiro','🚻',null); };
    });
    // Apply current filter state to fullscreen SVG
    applyMapFilter(fsSvg);
    // Sync filter button active states
    document.querySelectorAll('[data-mf]').forEach(btn=>btn.classList.toggle('active',mapFilter[btn.dataset.mf]));
    // Tap on background → hide info bar
    let _dragMoved=false;
    fsContainer.addEventListener('pointerdown',()=>_dragMoved=false,{once:false});
    fsContainer.addEventListener('pointermove',()=>_dragMoved=true,{once:false});
    fsContainer.addEventListener('click',()=>{ if(!_dragMoved) fsInfo.classList.add('hidden'); });
  }

  function closeFs(){overlay.classList.add('hidden');document.body.style.overflow='';fsInfo.classList.add('hidden');}

  expandBtn.onclick=openFs;
  fsClose.onclick=closeFs;
  document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!overlay.classList.contains('hidden')) closeFs();});
})();

setInterval(checkAlarms, 30000);

// Atualiza countdown em tempo real
function tickCountdown(){
  if(document.getElementById('cdUnits')){
    const FLIGHT_DT=new Date('2026-04-27T23:15:00');
    const TRIP_END=new Date('2026-05-11T23:59:59');
    const now=new Date();
    const ms=FLIGHT_DT-now;
    const ended=TRIP_END-now<0;
    const inTrip=ms<0&&!ended;
    if(ended||inTrip) return;
    const units=document.getElementById('cdUnits');
    if(!units) return;
    const isHours=ms<24*60*60*1000;
    const d=Math.floor(ms/86400000),h=Math.floor((ms%86400000)/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
    const vals=isHours?[['horas',h],['min',m],['seg',s]]:[['dias',d],['horas',h],['min',m]];
    vals.forEach(([lbl,val])=>{
      const el=document.getElementById('cd-'+lbl);
      if(!el) return;
      const str=String(Math.floor(val)).padStart(2,'0');
      if(el.textContent!==str){el.textContent=str;el.classList.remove('flip');void el.offsetWidth;el.classList.add('flip');}
    });
  }
}
setInterval(tickCountdown,1000);
setTab('home');
</script>
